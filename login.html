<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KuroStream — Login</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/dexie@4/dist/dexie.min.js"></script>
  <script defer src="js/components.js"></script>
  <script defer src="js/auth.js"></script>
  <script defer src="js/app.js"></script>
</head>
<body>
  <main class="app-shell">
<header class="topbar">
      <div class="brand">Kuro<span>Stream</span></div>
      <nav class="nav">
        <a href="index.html">Home</a>
        <a href="explore.html">Explore</a>
        <a href="detail.html">Details</a>
        <a href="watch.html">Watch</a>
        <a href="my-list.html">My List</a>
        <a id="auth-badge" href="login.html">Login</a>
      </nav>
      <label class="search">
        <span>⌕</span>
        <input id="global-search" placeholder="Search anime...">
      </label>
    </header>

    <section class="section card auth-card"><div class="card-body auth-form">
      <div>
        <h1 class="page-title">Login / Register</h1>
        <p class="muted">Sync your watch list and continue watching across sessions.</p>
      </div>
      <label class="field">
        <span>Email</span>
        <input id="email" class="input" type="email" placeholder="you@example.com" autocomplete="email">
      </label>
      <label class="field">
        <span>Password</span>
        <input id="password" type="password" class="input" placeholder="Enter password" autocomplete="current-password">
        <small class="muted">Minimum 6 characters.</small>
      </label>
      <div class="row auth-actions">
        <button id="login-btn" class="btn primary">Login</button>
        <button id="register-btn" class="btn">Register</button>
      </div>
      <p id="status" class="muted status-line"></p>
    </div></section>
  </main>

  <div id="modal" class="modal-backdrop"></div>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const setStatus = (msg) => UI.el('#status').textContent = msg;

      UI.el('#register-btn').onclick = async () => {
        try {
          await Auth.signUp(UI.el('#email').value.trim(), UI.el('#password').value);
          setStatus('Register sukses. Kalau email confirmation aktif, cek inbox dulu lalu login.');
        } catch (e) {
          setStatus(e.message || 'Register gagal');
        }
      };

      UI.el('#login-btn').onclick = async () => {
        try {
          await Auth.signIn(UI.el('#email').value.trim(), UI.el('#password').value);
          location.href = 'user.html';
        } catch (e) {
          setStatus(e.message || 'Login gagal');
        }
      };

      await Auth.initAuthBadge();
    });
  </script>
</body>
</html>
