<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KuroStream — My List</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/dexie@4/dist/dexie.min.js"></script>
  <script defer src="js/api.js"></script>
  <script defer src="js/components.js"></script>
  <script defer src="js/app.js"></script>
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div class="brand">Kuro<span>Stream</span></div>
      <nav class="nav">
        <a href="home.html">Home</a>
        <a href="explore.html">Explore</a>
        <a href="detail.html">Details</a>
        <a href="watch.html">Watch</a>
        <a href="my-list.html">My List</a>
      </nav>
      <label class="search">
        <span>🔎</span>
        <input id="global-search" placeholder="Search anime...">
      </label>
    </header>

    <section class="page-header">
      <div>
        <h1 class="page-title">My List</h1>
        <p class="page-subtitle">Manage saved titles and continue unfinished series.</p>
      </div>
    </section>

    <div class="tabbar">
      <button class="tab active" data-state="all">All</button>
      <button class="tab" data-state="ongoing">Watching</button>
      <button class="tab" data-state="completed">Completed</button>
    </div>

    <section class="section">
      <div id="list-grid" class="grid cards-4"></div>
    </section>
  </main>

  <div id="modal" class="modal-backdrop"></div>

  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const esc = UI.escapeHtml;
      let all = await UI.loadMyList();

      let state = "all";
      const continueRows = await UI.loadContinueWatching();
      const continueMap = new Map(continueRows.map((row) => [Number(row.id), row]));

      const render = () => {
        const rows = state === "all" ? all : all.filter((item) => item.status === state);
        UI.el("#list-grid").innerHTML = rows.length ? rows.map((anime) => {
          const continueData = continueMap.get(Number(anime.id));
          const targetEp = continueData?.ep || 1;
          const safeCover = anime.image ? String(anime.image).replace(/'/g, "%27") : '';
          return `
          <article class="card">
            ${safeCover ? `<div class="poster poster-image" style="background-image:url('${safeCover}')"></div>` : `<div class="poster">${esc(anime.genre)} • ${esc(anime.year)}</div>`}
            <div class="card-body">
              <p class="title">${esc(anime.title)}</p>
              <p class="meta">
                <span>⭐ ${esc(anime.rating)}</span>
                <span>${esc(anime.eps)} eps</span>
                <span class="badge">${esc(anime.status)}</span>
              </p>
              <div class="row">
                <button class="btn primary" data-watch="${anime.id}" data-ep="${targetEp}">Continue</button>
                <button class="btn remove" data-id="${anime.id}">Remove</button>
              </div>
            </div>
          </article>
        `}).join("") : `<p class="muted">My List masih kosong. Tambahkan anime dulu dari halaman detail/home.</p>`;

        document.querySelectorAll("[data-watch]").forEach((button) => {
          button.onclick = () => location.href = `watch.html?id=${button.dataset.watch}&ep=${button.dataset.ep || 1}`;
        });

        document.querySelectorAll(".remove").forEach((button) => {
          button.onclick = async () => {
            all = all.filter((a) => Number(a.id) !== Number(button.dataset.id));
            await UI.saveMyList(all);
            render();
          };
        });
      };

      document.querySelectorAll(".tab").forEach((tab) => {
        tab.onclick = () => {
          document.querySelectorAll(".tab").forEach((node) => node.classList.remove("active"));
          tab.classList.add("active");
          state = tab.dataset.state;
          render();
        };
      });

      render();
    });
  </script>
</body>
</html>
