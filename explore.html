<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KuroStream — Explore</title>
  <link rel="stylesheet" href="css/styles.css">
  <script defer src="js/mock-data.js"></script>
  <script defer src="js/api.js"></script>
  <script defer src="js/components.js"></script>
  <script defer src="js/app.js"></script>
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div class="brand">Kuro<span>Stream</span></div>
      <nav class="nav">
        <a href="home.html">Home</a>
        <a href="explore.html">Explore</a>
        <a href="detail.html">Details</a>
        <a href="watch.html">Watch</a>
        <a href="my-list.html">My List</a>
      </nav>
      <label class="search">
        <span>🔎</span>
        <input id="global-search" placeholder="Search anime...">
      </label>
    </header>

    <section class="page-header">
      <div>
        <h1 class="page-title">Explore Catalog</h1>
        <p class="page-subtitle">Browse by genre, discover top-rated titles, and filter by release year.</p>
      </div>
      <button id="open-filter" class="btn">Advanced Filters</button>
    </section>

    <section class="filters">
      <input id="q" class="input" placeholder="Search by title...">
      <select id="genre" class="select">
        <option>All</option>
        <option>Action</option>
        <option>Adventure</option>
        <option>Drama</option>
        <option>Comedy</option>
        <option>Sci-Fi</option>
        <option>Sports</option>
      </select>
      <select id="sort" class="select">
        <option value="rating">Sort by rating</option>
        <option value="year">Sort by release year</option>
      </select>
      <button id="clear-filter" class="btn ghost">Reset</button>
    </section>

    <section class="section">
      <div class="chips" id="quick-chips">
        <button class="chip active" data-genre="All">All</button>
        <button class="chip" data-genre="Action">Action</button>
        <button class="chip" data-genre="Adventure">Adventure</button>
        <button class="chip" data-genre="Drama">Drama</button>
        <button class="chip" data-genre="Sci-Fi">Sci-Fi</button>
      </div>
    </section>

    <section class="section">
      <div id="catalog" class="grid cards-5"></div>
      <div id="pager"></div>
    </section>
  </main>

  <div id="modal" class="modal-backdrop"></div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const state = {
        q: new URLSearchParams(location.search).get("q") || "",
        genre: "All",
        sort: "rating",
        page: 1,
        perPage: 10
      };

      const inputQ = UI.el("#q");
      inputQ.value = state.q;

      const render = async () => {
        const rows = await ApiClient.getCatalog({ q: state.q, genre: state.genre, sort: state.sort });
        const total = Math.max(1, Math.ceil(rows.length / state.perPage));
        state.page = Math.min(state.page, total);
        const slice = rows.slice((state.page - 1) * state.perPage, state.page * state.perPage);

        UI.el("#catalog").innerHTML = slice.map(UI.card).join("");
        UI.attachCardNavigation("#catalog");
        UI.el("#pager").innerHTML = UI.pager(state.page, total);

        document.querySelectorAll("[data-page]").forEach((button) => {
          button.onclick = () => {
            state.page = Number(button.dataset.page);
            render();
          };
        });
      };

      inputQ.addEventListener("input", (event) => {
        state.q = event.target.value.trim();
        state.page = 1;
        render();
      });

      UI.el("#genre").onchange = (event) => {
        state.genre = event.target.value;
        state.page = 1;
        document.querySelectorAll(".chip").forEach((chip) => {
          chip.classList.toggle("active", chip.dataset.genre === state.genre);
        });
        render();
      };

      UI.el("#sort").onchange = (event) => {
        state.sort = event.target.value;
        state.page = 1;
        render();
      };

      UI.el("#clear-filter").onclick = () => {
        state.q = "";
        state.genre = "All";
        state.sort = "rating";
        state.page = 1;
        inputQ.value = "";
        UI.el("#genre").value = "All";
        UI.el("#sort").value = "rating";
        document.querySelectorAll(".chip").forEach((chip) => chip.classList.toggle("active", chip.dataset.genre === "All"));
        render();
      };

      document.querySelectorAll(".chip").forEach((chip) => {
        chip.onclick = () => {
          document.querySelectorAll(".chip").forEach((node) => node.classList.remove("active"));
          chip.classList.add("active");
          state.genre = chip.dataset.genre;
          UI.el("#genre").value = state.genre;
          state.page = 1;
          render();
        };
      });

      UI.el("#open-filter").onclick = () => {
        UI.openModal("Advanced Filters", "Hook year, studio, status, and score filters to your backend query parameters.");
      };

      render();
    });
  </script>
</body>
</html>
