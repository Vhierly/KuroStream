<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KuroStream — Watch</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/dexie@4/dist/dexie.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="js/api.js"></script>
  <script defer src="js/components.js"></script>
  <script defer src="js/auth.js"></script>
  <script defer src="js/app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>
  <main class="app-shell">
<header class="topbar">
      <div class="brand">Kuro<span>Stream</span></div>
      <nav class="nav">
        <a href="index.html">Home</a>
        <a href="explore.html">Explore</a>
        <a href="detail.html">Details</a>
        <a href="watch.html">Watch</a>
        <a href="my-list.html">My List</a>
        <a id="auth-badge" href="login.html">Login</a>
      </nav>
      <label class="search">
        <span>⌕</span>
        <input id="global-search" placeholder="Search anime...">
      </label>
    </header>

    <section class="page-header">
      <h1 class="page-title" id="watch-title">Now Playing</h1>
    </section>

    <section class="split-watch">
      <article class="player">
        <div class="player-screen">
          <button class="btn primary" id="play-toggle">▶ Play</button>
        </div>
        <div class="player-controls">
          <div class="row">
            <button class="btn" id="prev-ep">⏮ Previous</button>
            <button class="btn" id="next-ep">Next ⏭</button>
            <select id="source-select" class="select quality-select">
              <option value="en">Source: EN</option>
              <option value="id">Source: ID</option>
            </select>
            <select id="quality-select" class="select quality-select">
              <option value="0">Auto quality</option>
            </select>
            <button class="btn ghost" id="download-open">Downloads</button>
          </div>
          <div class="row">
            <span class="muted">Auto-next</span>
            <div class="switch" id="auto-next"></div>
          </div>
        </div>
      </article>

      <aside class="card">
        <div class="card-body">
          <h3>Episode List</h3>
          <div id="ep-list" class="list"></div>
        </div>
      </aside>
    </section>

    <section class="section">
      <h2>Related / Recommended</h2>
      <div id="related" class="grid cards-5"></div>
    </section>
  </main>

  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const esc = UI.escapeHtml;
      const saved = (await UI.getSetting("autonext", "0")) === "1";
      const autoSwitch = UI.el("#auto-next");
      const qualitySelect = UI.el("#quality-select");
      const sourceSelect = UI.el("#source-select");
      if (saved) autoSwitch.classList.add("on");

      autoSwitch.onclick = async () => {
        autoSwitch.classList.toggle("on");
        await UI.setSetting("autonext", autoSwitch.classList.contains("on") ? "1" : "0");
      };

      window.addEventListener('beforeunload', () => {
        saveRealtimeProgress();
        if (progressTimer) clearInterval(progressTimer);
      });

      const query = new URLSearchParams(location.search);
      const animeId = Number(query.get("id") || 20);
      const animeSession = query.get("session") || "";
      const animeTitle = query.get("title") || "";
      let episode = Number(query.get("ep") || 1);
      let watch = null;
      let hls = null;
      let selectedQualityIndex = 0;
      let selectedSourceLang = 'en';
      let progressTimer = null;
      let shouldAutoPlayAfterLoad = false;
      let autoNextTriggered = false;

      const saveRealtimeProgress = (percentOverride = null) => {
        if (!watch?.anime?.id) return;
        let progress = Number(percentOverride);
        const video = UI.el("#video-player");
        if (!Number.isFinite(progress)) {
          if (video && Number(video.duration) > 0) {
            progress = Math.round((video.currentTime / video.duration) * 100);
          } else {
            progress = 0;
          }
        }
        progress = Math.max(0, Math.min(100, progress));

        UI.updateContinueWatching({
          id: watch.anime.id,
          title: watch.anime.title,
          image: watch.anime.image || null,
          ep: episode,
          progress
        });
      };

      const playCurrentEpisode = async () => {
        await loadWatch();
        const nextQuery = new URLSearchParams({ id: String(animeId), ep: String(episode) });
        if (animeSession) nextQuery.set('session', animeSession);
        if (animeTitle) nextQuery.set('title', animeTitle);
        history.replaceState({}, '', `watch.html?${nextQuery.toString()}`);
      };

      const bindAutoNext = () => {
        const video = UI.el("#video-player");
        if (!video) return;

        autoNextTriggered = false;

        if (progressTimer) {
          clearInterval(progressTimer);
          progressTimer = null;
        }

        const goNextEpisode = async () => {
          if (autoNextTriggered) return;
          autoNextTriggered = true;

          saveRealtimeProgress(100);
          if (!autoSwitch.classList.contains('on')) return;

          const prevEpisode = episode;
          shouldAutoPlayAfterLoad = true;
          episode += 1;

          try {
            await playCurrentEpisode();
          } catch (_error) {
            // Kalau episode berikutnya tidak tersedia, balik ke episode lama.
            episode = prevEpisode;
            shouldAutoPlayAfterLoad = false;
          }
        };

        video.addEventListener('timeupdate', async () => {
          saveRealtimeProgress();

          // Fallback: beberapa stream HLS tidak selalu trigger `ended`.
          const duration = Number(video.duration);
          const currentTime = Number(video.currentTime);
          if (!autoNextTriggered && Number.isFinite(duration) && duration > 0 && (duration - currentTime) <= 0.35) {
            await goNextEpisode();
          }
        });

        progressTimer = setInterval(() => saveRealtimeProgress(), 5000);
        video.onended = goNextEpisode;
      };

      const getSourcesByLang = () => {
        const all = watch?.streamProvider?.sources || watch?.streamProvider?.providers?.subEng?.sources || [];
        if (selectedSourceLang === 'dub') return all.filter((s) => s.isDub === true);
        if (selectedSourceLang === 'sub') return all.filter((s) => s.isDub !== true);
        return all;
      };

      const applySource = (sourceIndex = 0) => {
        const screen = UI.el(".player-screen");
        const sources = getSourcesByLang();
        const selected = sources[sourceIndex] || sources[0];
        selectedQualityIndex = sourceIndex;

        if (hls) {
          hls.destroy();
          hls = null;
        }

        if (!selected?.url && !selected?.embed) {
          const note = watch?.streamProvider?.note || 'No streaming source available.';
          const trailerEmbed = watch?.streamProvider?.trailer?.embed || null;
          const hasApiMisconfig = /not configured/i.test(note);

          if (hasApiMisconfig) {
            screen.innerHTML = `
              <div class="card" style="max-width:760px;margin:0 auto;">
                <div class="card-body" style="text-align:left;">
                  <h3>Streaming API not active</h3>
                  <p class="muted" style="margin-bottom:10px;">${esc(note)}</p>
                  ${trailerEmbed ? '<button class="btn" id="open-trailer-only">Watch trailer on YouTube</button>' : ''}
                </div>
              </div>
            `;

            const trailerBtn = UI.el('#open-trailer-only');
            if (trailerBtn && trailerEmbed) {
              let openUrl = String(trailerEmbed);
              if (openUrl.includes('listType=search') && openUrl.includes('list=')) {
                const q = decodeURIComponent(openUrl.split('list=')[1] || '').replace(/\+/g, ' ');
                openUrl = `https://www.youtube.com/results?search_query=${encodeURIComponent(q)}`;
              } else {
                openUrl = openUrl
                  .replace('youtube.com/embed/', 'youtube.com/watch?v=')
                  .replace('youtube-nocookie.com/embed/', 'youtube.com/watch?v=');
              }
              trailerBtn.onclick = () => window.open(openUrl, '_blank', 'noopener,noreferrer');
            }
            return;
          }

          screen.innerHTML = `
            <div class="card" style="max-width:760px;margin:0 auto;">
              <div class="card-body" style="text-align:center;">
                <h3>No playable stream found</h3>
                <p class="muted">${esc(note)}</p>
                ${trailerEmbed ? '<button class="btn primary" id="open-trailer-fallback">Open trailer</button>' : ''}
              </div>
            </div>
          `;
          const fallbackBtn = UI.el('#open-trailer-fallback');
          if (fallbackBtn && trailerEmbed) fallbackBtn.onclick = () => window.open(String(trailerEmbed).replace('youtube.com/embed/', 'youtube.com/watch?v='), '_blank', 'noopener,noreferrer');
          return;
        }

        if (selected?.embed) {
          const isYouTubeEmbed = /youtube\.com\/embed|youtube-nocookie\.com\/embed/i.test(String(selected.embed));

          if (isYouTubeEmbed) {
            let openUrl = String(selected.embed);
            if (openUrl.includes('listType=search') && openUrl.includes('list=')) {
              const q = decodeURIComponent(openUrl.split('list=')[1] || '').replace(/\+/g, ' ');
              openUrl = `https://www.youtube.com/results?search_query=${encodeURIComponent(q)}`;
            } else {
              openUrl = openUrl
                .replace('youtube.com/embed/', 'youtube.com/watch?v=')
                .replace('youtube-nocookie.com/embed/', 'youtube.com/watch?v=');
            }

            screen.innerHTML = `
              <div class="card" style="max-width:720px;margin:0 auto;">
                <div class="card-body" style="text-align:center;">
                  <h3>Trailer fallback</h3>
                  <p class="muted">YouTube can block embedded playback (Error 153). Open trailer directly on YouTube.</p>
                  <button class="btn primary" id="open-youtube-trailer">Open on YouTube</button>
                </div>
              </div>
            `;

            const openBtn = UI.el('#open-youtube-trailer');
            if (openBtn) {
              openBtn.onclick = () => window.open(openUrl, '_blank', 'noopener,noreferrer');
            }
            saveRealtimeProgress(5);
            return;
          }

          screen.innerHTML = `
            <iframe
              id="embed-player"
              class="embed-player"
              src="${selected.embed}"
              allowfullscreen
              referrerpolicy="no-referrer"
              loading="lazy"
            ></iframe>
          `;
          saveRealtimeProgress(5);
          return;
        }

        screen.innerHTML = `<video id="video-player" controls playsinline></video>`;
        const video = UI.el("#video-player");

        if (video.canPlayType('application/vnd.apple.mpegurl')) {
          video.src = selected.url;
        } else if (window.Hls?.isSupported()) {
          hls = new Hls();
          hls.loadSource(selected.url);
          hls.attachMedia(video);
        } else {
          screen.innerHTML = `<div class="muted">Browser does not support HLS playback.</div>`;
          return;
        }

        bindAutoNext();

        if (shouldAutoPlayAfterLoad) {
          const attemptPlay = async () => {
            try {
              await video.play();
            } catch (_error) {
              // Autoplay can be blocked by browser policy; keep manual play as fallback.
            } finally {
              shouldAutoPlayAfterLoad = false;
            }
          };

          if (hls) {
            hls.once(Hls.Events.MANIFEST_PARSED, () => {
              attemptPlay();
            });
          } else {
            video.addEventListener('loadedmetadata', () => {
              attemptPlay();
            }, { once: true });
          }
        }
      };

      const renderQualityOptions = () => {
        const sources = getSourcesByLang();
        if (!sources.length) {
          qualitySelect.innerHTML = `<option value="0">No quality available</option>`;
          qualitySelect.disabled = true;
          return;
        }

        qualitySelect.disabled = false;
        qualitySelect.innerHTML = sources
          .map((s, idx) => {
            const label = /^\d+$/.test(String(s.resolution || '')) ? `${s.resolution}p` : (s.resolution || `Quality ${idx + 1}`);
            const meta = [s.isDub ? 'DUB' : 'SUB', s.fanSub || s.fansub, s.filesize || s.size].filter(Boolean).join(' • ');
            return `<option value="${idx}">${esc(label)}${meta ? ` • ${esc(meta)}` : ''}</option>`;
          })
          .join('');
        qualitySelect.value = String(Math.min(selectedQualityIndex, sources.length - 1));
      };

      const EPISODES_PER_PAGE = 25;
      let episodeListPage = 1;

      const loadWatch = async () => {
        watch = await ApiClient.getWatchContext(animeId, episode, { session: animeSession, title: animeTitle });
        UI.el("#watch-title").textContent = `${watch.anime.title} — Streaming`;
        UI.el("#prev-ep").disabled = episode <= 1;
        UI.el("#next-ep").disabled = episode >= watch.episodes.length;

        UI.el("#related").innerHTML = watch.related.map(UI.card).join("");
        UI.attachCardNavigation("#related");

        const renderEpisodeList = () => {
          const total = watch.episodes.length;
          const totalPages = Math.max(1, Math.ceil(total / EPISODES_PER_PAGE));
          episodeListPage = Math.min(Math.max(1, episodeListPage), totalPages);
          const start = (episodeListPage - 1) * EPISODES_PER_PAGE;
          const rows = watch.episodes.slice(start, start + EPISODES_PER_PAGE);
          const episodeThumb = watch?.anime?.image ? String(watch.anime.image).replace(/'/g, "%27") : '';

          UI.el("#ep-list").innerHTML = `
            <div class="row episode-list-head">
              <span class="muted">Episodes ${start + 1}-${Math.min(start + EPISODES_PER_PAGE, total)} of ${total}</span>
              <div class="row">
                <button class="btn" id="watch-ep-prev" ${episodeListPage <= 1 ? 'disabled' : ''}>← Prev</button>
                <span class="muted" style="align-self:center;">Page ${episodeListPage}/${totalPages}</span>
                <button class="btn" id="watch-ep-next" ${episodeListPage >= totalPages ? 'disabled' : ''}>Next →</button>
              </div>
            </div>
            ${rows.map((item) => `
              <article class="list-item">
                <div class="thumb ${episodeThumb ? 'thumb-image' : ''}" ${episodeThumb ? `style="background-image:url('${episodeThumb}')"` : ''}></div>
                <div>
                  <p class="title">E${esc(item.num)}: ${esc(item.title)}</p>
                  <p class="meta"><span>${esc(item.duration)}</span></p>
                </div>
                <button class="btn" data-ep="${item.num}">Play</button>
              </article>
            `).join("")}
          `;

          const prev = UI.el('#watch-ep-prev');
          const next = UI.el('#watch-ep-next');
          if (prev) prev.onclick = () => { episodeListPage -= 1; renderEpisodeList(); };
          if (next) next.onclick = () => { episodeListPage += 1; renderEpisodeList(); };

          document.querySelectorAll("[data-ep]").forEach((button) => {
            button.onclick = async () => {
              saveRealtimeProgress();
              episode = Number(button.dataset.ep);
              await playCurrentEpisode();
            };
          });
        };

        episodeListPage = Math.ceil(Math.max(1, episode) / EPISODES_PER_PAGE);
        renderEpisodeList();

        const allSources = watch?.streamProvider?.sources || [];
        const subCount = allSources.filter((s) => s.isDub !== true).length;
        const dubCount = allSources.filter((s) => s.isDub === true).length;
        if (sourceSelect) {
          sourceSelect.innerHTML = [
            `<option value="all">All sources (${allSources.length})</option>`,
            `<option value="sub">SUB (${subCount})</option>`,
            `<option value="dub">DUB (${dubCount})</option>`
          ].join('');
          selectedSourceLang = subCount ? 'sub' : 'all';
          sourceSelect.value = selectedSourceLang;
        }

        const downloadBtn = UI.el('#download-open');
        if (downloadBtn) {
          downloadBtn.onclick = () => {
            const rows = watch?.streamProvider?.downloads || [];
            UI.openModal('Download links', rows.length ? rows.map((d) => {
              const label = [d.resolution ? `${d.resolution}p` : d.quality, d.fansub || d.fanSub, d.filesize || d.size].filter(Boolean).join(' • ');
              const href = d.url || d.link || '#';
              return `<p><a class="btn" href="${esc(href)}" target="_blank" rel="noopener noreferrer">${esc(label || 'Download')}</a></p>`;
            }).join('') : 'No download links returned by AnimePahe for this episode.');
          };
        }

        saveRealtimeProgress();
        renderQualityOptions();
        applySource(Math.min(selectedQualityIndex, getSourcesByLang().length - 1));
      };

      qualitySelect.onchange = () => {
        selectedQualityIndex = Number(qualitySelect.value || 0);
        applySource(selectedQualityIndex);
      };

      if (sourceSelect) {
        sourceSelect.onchange = () => {
          selectedSourceLang = sourceSelect.value || 'all';
          selectedQualityIndex = 0;
          renderQualityOptions();
          applySource(0);
        };
      }

      UI.el("#prev-ep").onclick = async () => {
        saveRealtimeProgress();
        episode = Math.max(1, episode - 1);
        await playCurrentEpisode();
      };

      UI.el("#next-ep").onclick = async () => {
        saveRealtimeProgress();
        episode = Math.min(watch.episodes.length, episode + 1);
        await playCurrentEpisode();
      };

      UI.el("#play-toggle").onclick = () => {
        const iframe = UI.el("#embed-player");
        if (iframe) {
          window.open(iframe.src, '_blank', 'noopener,noreferrer');
          return;
        }

        const video = UI.el("#video-player");
        if (!video) return;
        if (video.paused) video.play();
        else video.pause();
      };

      try {
        await loadWatch();
      } catch (error) {
        UI.openModal("Error", error.message || "Failed to load watch page");
      }
    });
  </script>
</body>
</html>
