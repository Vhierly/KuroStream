<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KuroStream — Anime Details</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/dexie@4/dist/dexie.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="js/api.js"></script>
  <script defer src="js/components.js"></script>
  <script defer src="js/auth.js"></script>
  <script defer src="js/app.js"></script>
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div class="brand">Kuro<span>Stream</span></div>
      <nav class="nav">
        <a href="home.html">Home</a>
        <a href="explore.html">Explore</a>
        <a href="detail.html">Details</a>
        <a href="watch.html">Watch</a>
        <a href="my-list.html">My List</a>
              <a id="auth-badge" href="login.html">Login</a>
      </nav>
      <label class="search">
        <span>🔎</span>
        <input id="global-search" placeholder="Search anime...">
      </label>
    </header>

    <section class="split-detail">
      <article class="card">
        <div class="poster" id="cover">Cover art</div>
      </article>

      <article class="card">
        <div class="card-body">
          <div class="row">
            <span class="badge">Anime Details</span>
            <span class="badge" id="rating"></span>
          </div>
          <h1 class="page-title" id="title">Loading title...</h1>
          <p class="meta" id="meta"></p>
          <p class="muted" id="synopsis"></p>
          <div class="row">
            <button class="btn primary" id="watch-now">▶ Watch Now</button>
            <button class="btn" id="bookmark">＋ Add to My List</button>
            <button class="btn ghost" id="trailer">Watch Trailer</button>
          </div>
        </div>
      </article>
    </section>

    <section class="section">
      <div class="tabbar">
        <button class="tab active" data-tab="episodes">Episodes</button>
        <button class="tab" data-tab="info">Info</button>
        <button class="tab" data-tab="cast">Cast & Studio</button>
      </div>
      <div id="tab-content" class="section"></div>
    </section>
  </main>

  <div id="modal" class="modal-backdrop"></div>

  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const esc = UI.escapeHtml;
      try {
        const query = new URLSearchParams(location.search);
        const animeId = Number(query.get("id") || 2);
        const detail = await ApiClient.getAnimeDetail(animeId);

        UI.el("#title").textContent = detail.anime.title;
        UI.el("#rating").textContent = `⭐ ${detail.anime.rating}`;
        UI.el("#meta").innerHTML = [
          `<span>${esc(detail.anime.genre)}</span>`,
          `<span>${esc(detail.anime.year || '-')}</span>`,
          `<span>${esc(detail.anime.eps)} episodes</span>`
        ].join("");
        UI.el("#synopsis").textContent = detail.synopsis;

        const cover = UI.el("#cover");
        if (detail.anime.image) {
          cover.classList.add("poster-image");
          cover.style.backgroundImage = `url('${detail.anime.image}')`;
          cover.textContent = "";
        } else {
          cover.textContent = `${detail.anime.genre} • ${detail.anime.year || '-'}`;
        }

        const EPISODES_PER_PAGE = 50;
        let episodePage = 1;

        const renderEpisodeTab = () => {
          const totalEpisodes = detail.episodes.length;
          const totalPages = Math.max(1, Math.ceil(totalEpisodes / EPISODES_PER_PAGE));
          episodePage = Math.min(Math.max(1, episodePage), totalPages);
          const start = (episodePage - 1) * EPISODES_PER_PAGE;
          const rows = detail.episodes.slice(start, start + EPISODES_PER_PAGE);

          return `
            <div class="row" style="justify-content:space-between;margin-bottom:10px;">
              <span class="muted">Episode ${start + 1}-${Math.min(start + EPISODES_PER_PAGE, totalEpisodes)} dari ${totalEpisodes}</span>
              <div class="row">
                <button class="btn" id="ep-prev-page" ${episodePage <= 1 ? 'disabled' : ''}>← Prev</button>
                <span class="muted" style="align-self:center;">Page ${episodePage}/${totalPages}</span>
                <button class="btn" id="ep-next-page" ${episodePage >= totalPages ? 'disabled' : ''}>Next →</button>
              </div>
            </div>
            ${rows.map((episode) => `
              <article class="list-item">
                <div class="thumb ${detail.anime.image ? 'thumb-image' : ''}" ${detail.anime.image ? `style="background-image:url('${String(detail.anime.image).replace(/'/g, "%27")}')"` : ''}></div>
                <div>
                  <p class="title">Episode ${episode.num} — ${episode.title}</p>
                  <p class="meta"><span>${episode.duration}</span></p>
                </div>
                <button class="btn" onclick="location.href='watch.html?id=${animeId}&ep=${episode.num}'">Play</button>
              </article>
            `).join('')}
          `;
        };

        const tabs = {
          episodes: renderEpisodeTab,

          info: () => `
            <article class="card">
              <div class="card-body">
                <p class="meta"><span>Studio: ${esc((detail.info?.studios || []).join(', ') || '-')}</span></p>
                <p class="meta"><span>Source: ${esc(detail.info?.source || '-')}</span></p>
                <p class="meta"><span>Status: ${esc(detail.info?.status || '-')}</span></p>
                <p class="meta"><span>Type/Season: ${esc(detail.info?.type || '-')} • ${esc(detail.info?.season || '-')}</span></p>
              </div>
            </article>
          `,

          cast: () => `
            <article class="card">
              <div class="card-body">
                <p class="meta"><span>Studio: ${esc((detail.info?.studios || []).join(', ') || '-')}</span></p>
                ${((detail.cast || []).length
                  ? detail.cast.map((row) => `
                      <p class="meta">
                        <span>${esc(row.character)}</span>
                        <span>${esc(row.role)}</span>
                        <span>VA: ${esc(row.voiceActor)} (${esc(row.language)})</span>
                      </p>
                    `).join('')
                  : '<p class="meta"><span>Data cast belum tersedia.</span></p>')}
              </div>
            </article>
          `
        };

        const renderTab = (key = "episodes") => {
          UI.el("#tab-content").innerHTML = tabs[key]();
          if (key === 'episodes') {
            const prevBtn = UI.el('#ep-prev-page');
            const nextBtn = UI.el('#ep-next-page');
            if (prevBtn) prevBtn.onclick = () => { episodePage -= 1; renderTab('episodes'); };
            if (nextBtn) nextBtn.onclick = () => { episodePage += 1; renderTab('episodes'); };
          }
        };

        renderTab();

        document.querySelectorAll(".tab").forEach((tab) => {
          tab.onclick = () => {
            document.querySelectorAll(".tab").forEach((node) => node.classList.remove("active"));
            tab.classList.add("active");
            renderTab(tab.dataset.tab);
          };
        });

        UI.el("#watch-now").onclick = () => location.href = `watch.html?id=${animeId}&ep=1`;
        UI.el("#bookmark").onclick = async () => {
          const saved = await UI.toggleMyList(detail.anime);
          UI.openModal(saved ? "Saved" : "Removed", saved ? "Anime added to My List." : "Anime removed from My List.");
        };
        UI.el("#trailer").onclick = () => {
          const trailer = detail.info?.trailerUrl;
          if (trailer) window.open(trailer, "_blank");
          else UI.openModal("Trailer", "Trailer belum tersedia untuk anime ini.");
        };
      } catch (error) {
        UI.openModal("Error", error.message || "Gagal load detail anime.");
      }
    });
  </script>
</body>
</html>
